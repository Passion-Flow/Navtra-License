{{- if .Values.api.enabled }}
{{- $db := include "forge.datasource" . | fromJson }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "forge.fullname" . }}-api-secret
  labels:
{{- include "forge.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_PASSWORD: {{ $db.password | b64enc | quote }}
  # api holds BOTH KEKs: the master KEK (wraps the signing key + 2FA secrets) and the edge KEK
  # (needed at bootstrap to wrap the edge_lease key). The app fails closed if the master KEK is empty.
  FORGE_FIELD_ENCRYPTION_KEY: {{ .Values.secret.masterKek | b64enc | quote }}
  FORGE_EDGE_KEK: {{ .Values.secret.edgeKek | b64enc | quote }}
  EDGE_INTERNAL_TOKEN: {{ .Values.secret.edgeInternalToken | b64enc | quote }}
{{- end }}

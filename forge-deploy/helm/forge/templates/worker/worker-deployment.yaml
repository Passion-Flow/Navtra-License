{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
{{- include "forge.labels" . | nindent 4 }}
    app: {{ template "forge.fullname" . }}-worker
  name: {{ template "forge.fullname" . }}-worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
{{- include "forge.selectorLabels" . | nindent 6 }}
      app: {{ template "forge.fullname" . }}-worker
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/worker/worker-config.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/worker/worker-secret.yaml") . | sha256sum }}
        checksum/shared-db-config: {{ include (print $.Template.BasePath "/shared/db/db-config.yaml") . | sha256sum }}
        checksum/shared-mail-config: {{ include (print $.Template.BasePath "/shared/mail/mail-config.yaml") . | sha256sum }}
      labels:
{{- include "forge.selectorLabels" . | nindent 8 }}
        app: {{ template "forge.fullname" . }}-worker
{{- include "forge.podExtraLabels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.worker.serviceAccountName }}
      serviceAccountName: {{ .Values.worker.serviceAccountName | quote }}
      {{- end }}
      {{- if include "forge.customCA.enabled" . }}
      initContainers:
{{ include "forge.customCA.initContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ template "forge.fullname" . }}-worker
          image: {{ include "forge.componentImage" (dict "comp" .Values.worker "ctx" .) | quote }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command:
            - celery
            - -A
            - app.worker
            - worker
            - -Q
            - {{ .Values.worker.queues | quote }}
            - --loglevel=info
            {{- if .Values.worker.concurrency }}
            - --concurrency={{ .Values.worker.concurrency }}
            {{- end }}
          env:
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if include "forge.customCA.enabled" . }}
            {{- include "forge.customCA.env" . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ template "forge.fullname" . }}-worker-config
            - secretRef:
                name: {{ template "forge.fullname" . }}-worker-secret
            - configMapRef:
                name: {{ template "forge.fullname" . }}-shared-db-config
            - configMapRef:
                name: {{ template "forge.fullname" . }}-shared-redis-config
            - secretRef:
                name: {{ template "forge.fullname" . }}-shared-redis-secret
            {{- if .Values.persistence.enabled }}
            - configMapRef:
                name: {{ template "forge.fullname" . }}-shared-storage-config
            - secretRef:
                name: {{ template "forge.fullname" . }}-shared-storage-secret
            {{- end }}
            {{- if .Values.mail.enabled }}
            - configMapRef:
                name: {{ template "forge.fullname" . }}-shared-mail-config
            - secretRef:
                name: {{ template "forge.fullname" . }}-shared-mail-secret
            {{- end }}
            {{- if .Values.search.enabled }}
            - configMapRef:
                name: {{ template "forge.fullname" . }}-shared-search-config
            - secretRef:
                name: {{ template "forge.fullname" . }}-shared-search-secret
            {{- end }}
          {{- with .Values.worker.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- if include "forge.customCA.enabled" . }}
          volumeMounts:
{{ include "forge.customCA.volumeMount" . | nindent 12 }}
          {{- end }}
      {{- with (.Values.worker.nodeSelector | default .Values.global.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if include "forge.customCA.enabled" . }}
      volumes:
{{ include "forge.customCA.volume" . | nindent 8 }}
      {{- end }}
{{- end }}

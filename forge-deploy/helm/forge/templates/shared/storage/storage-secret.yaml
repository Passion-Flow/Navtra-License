{{- if and .Values.persistence.enabled (or .Values.api.enabled .Values.edge.enabled .Values.worker.enabled .Values.scheduler.enabled) }}
{{- $s := include "forge.storage" . | fromJson }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "forge.fullname" . }}-shared-storage-secret
  labels:
{{- include "forge.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if eq $s.type "azure-blob" }}
  OBJECT_STORAGE_AZURE_KEY: {{ $s.accountKey | default "" | b64enc | quote }}
  {{- else if eq $s.type "google-storage" }}
  OBJECT_STORAGE_GCS_CREDENTIALS_JSON: {{ $s.serviceAccountJson | default "" | b64enc | quote }}
  {{- else }}
  OBJECT_STORAGE_ACCESS_KEY: {{ $s.accessKey | default "" | b64enc | quote }}
  OBJECT_STORAGE_SECRET_KEY: {{ $s.secretKey | default "" | b64enc | quote }}
  {{- end }}
{{- end }}

{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ template "forge.fullname" . }}-web
  labels:
{{- include "forge.labels" . | nindent 4 }}
    app: {{ template "forge.fullname" . }}-web
spec:
  type: ClusterIP
  selector:
{{- include "forge.selectorLabels" . | nindent 4 }}
    app: {{ template "forge.fullname" . }}-web
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
{{- end }}

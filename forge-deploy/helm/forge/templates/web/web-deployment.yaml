{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
{{- include "forge.labels" . | nindent 4 }}
    app: {{ template "forge.fullname" . }}-web
  name: {{ template "forge.fullname" . }}-web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
{{- include "forge.selectorLabels" . | nindent 6 }}
      app: {{ template "forge.fullname" . }}-web
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/web/web-config.yaml") . | sha256sum }}
      labels:
{{- include "forge.selectorLabels" . | nindent 8 }}
        app: {{ template "forge.fullname" . }}-web
{{- include "forge.podExtraLabels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.web.serviceAccountName }}
      serviceAccountName: {{ .Values.web.serviceAccountName | quote }}
      {{- end }}
      containers:
        - name: {{ template "forge.fullname" . }}-web
          image: {{ include "forge.componentImage" (dict "comp" .Values.web "ctx" .) | quote }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          {{- with .Values.web.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ template "forge.fullname" . }}-web-config
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          {{- with .Values.web.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.web.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      {{- with (.Values.web.nodeSelector | default .Values.global.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if .Values.edge.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "forge.fullname" . }}-edge-secret
  labels:
{{- include "forge.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_PASSWORD: {{ .Values.database.edgePassword | b64enc | quote }}
  # edge gets ONLY the edge KEK — it can sign online leases but can NEVER decrypt the master signing
  # key, even with DB access. The master KEK is deliberately absent from this Secret.
  FORGE_EDGE_KEK: {{ .Values.secret.edgeKek | b64enc | quote }}
  EDGE_INTERNAL_TOKEN: {{ .Values.secret.edgeInternalToken | b64enc | quote }}
{{- end }}

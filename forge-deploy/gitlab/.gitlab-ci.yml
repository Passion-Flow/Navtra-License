# Forge — GitLab CI/CD delivery artifact.
# Stages: lint → test → build (multi-arch) → push (MANUAL) → deploy (MANUAL, to Kubernetes via Helm).
# Images are NEVER pushed automatically — a human triggers `push:images` after full verification.
#
# Works with ANY private registry (internal Harbor or Aliyun ACR). Set these as Protected/masked CI
# variables (Settings → CI/CD → Variables — NEVER hard-code them here):
#   REGISTRY            e.g. harbor.intra.example.com   (or crpi-….cr.aliyuncs.com)
#   REGISTRY_NAMESPACE  e.g. forge                      (or navtra-mirror)
#   REGISTRY_USER       registry username / robot account
#   REGISTRY_PASSWORD   registry password               (masked)
# For the deploy stage (optional): KUBE_NAMESPACE, KUBECONFIG (a File-type variable), and the KEKs
#   FORGE_MASTER_KEK, FORGE_EDGE_KEK, FORGE_EDGE_INTERNAL_TOKEN (masked).
#
# Two helper scripts live in Scripts/ — pick the one matching your runner/target:
#   generate-image-repo-secret-docker.sh   docker-based runner: `docker login` to the registry
#   generate-image-repo-secret-k8s.sh      k8s target: create the forge-image-repo-secret pull Secret

stages: [lint, test, build, push, deploy]

variables:
  VERSION: "v1.0.0"
  IMAGE_API: "$REGISTRY/$REGISTRY_NAMESPACE/forge-api"
  IMAGE_WEB: "$REGISTRY/$REGISTRY_NAMESPACE/forge-web"
  PLATFORMS: "linux/amd64,linux/arm64"     # 信创: covers Hygon/Zhaoxin x86 + Kunpeng/Phytium arm64

# ---- lint -------------------------------------------------------------------------------------
lint:backend:
  stage: lint
  image: python:3.14-slim
  script:
    - pip install -q ruff
    - cd Project-source/forge-server && ruff check app
  allow_failure: true

lint:frontend:
  stage: lint
  image: node:24-alpine
  script:
    - cd Project-source/forge-admin && npm ci && npm run lint
  allow_failure: true

# ---- test -------------------------------------------------------------------------------------
test:backend:
  stage: test
  image: python:3.14-slim
  services:
    - name: postgres:18-alpine
      alias: postgres
    - name: redis:8.8-alpine
      alias: redis
  variables:
    POSTGRES_USER: forge_app
    POSTGRES_PASSWORD: testpass
    POSTGRES_DB: forge_main
    FORGE_INTEGRATION: "1"
    DATABASE_TYPE: postgres
    DATABASE_HOST: postgres
    DATABASE_USERNAME: forge_app
    DATABASE_PASSWORD: testpass
    DATABASE_NAME: forge_main
    DATABASE_SSL_MODE: disable
    CACHE_HOST: redis
    FORGE_FIELD_ENCRYPTION_KEY: "MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA="
  script:
    - cd Project-source/forge-server
    - pip install -q -e ".[dev]"
    - forge migrate up && forge bootstrap --silent
    - python -m pytest -q

test:frontend:
  stage: test
  image: node:24-alpine
  script:
    - cd Project-source/forge-admin && npm ci && npm run build   # tsc --noEmit + vite build

# ---- build (multi-arch; loads to the runner, does NOT push) -----------------------------------
.buildx: &buildx
  stage: build
  image: docker:27
  services: [docker:27-dind]
  before_script:
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx create --use

build:api:
  <<: *buildx
  script:
    - docker buildx build --platform "$PLATFORMS" -t "$IMAGE_API:$VERSION"
        -f Project-source/forge-server/Dockerfile Project-source
  rules:
    - if: $CI_COMMIT_BRANCH

build:web:
  <<: *buildx
  script:
    - docker buildx build --platform "$PLATFORMS" -t "$IMAGE_WEB:$VERSION"
        -f Project-source/forge-admin/Dockerfile Project-source/forge-admin
  rules:
    - if: $CI_COMMIT_BRANCH

# ---- push (MANUAL only — never automatic; run after 100% verification) ------------------------
push:images:
  stage: push
  image: docker:27
  services: [docker:27-dind]
  when: manual                       # ← human-triggered gate; CI never pushes on its own
  before_script:
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx create --use
    - echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin
  script:
    - docker buildx build --platform "$PLATFORMS" -t "$IMAGE_API:$VERSION"
        -f Project-source/forge-server/Dockerfile Project-source --push
    - docker buildx build --platform "$PLATFORMS" -t "$IMAGE_WEB:$VERSION"
        -f Project-source/forge-admin/Dockerfile Project-source/forge-admin --push

# ---- deploy (MANUAL — Helm install/upgrade onto Kubernetes) -----------------------------------
# Requires CI vars: KUBECONFIG (File), KUBE_NAMESPACE, REGISTRY*, FORGE_MASTER_KEK, FORGE_EDGE_KEK,
# FORGE_EDGE_INTERNAL_TOKEN. Edit the --set lines to point at your external DB/cache.
deploy:helm:
  stage: deploy
  image: alpine/helm:3.16.2
  when: manual
  before_script:
    - apk add --no-cache bash kubectl
    # create the image-pull secret on the cluster (forge-image-repo-secret)
    - bash forge-deploy/gitlab/Scripts/generate-image-repo-secret-k8s.sh
        "$REGISTRY_USER" "$REGISTRY_PASSWORD" "$KUBE_NAMESPACE" "https://$REGISTRY"
  script:
    - helm dependency build forge-deploy/helm/forge
    - helm upgrade --install forge forge-deploy/helm/forge
        -n "$KUBE_NAMESPACE" --create-namespace
        --set imagePullSecrets[0].name=forge-image-repo-secret
        --set secret.masterKek="$FORGE_MASTER_KEK"
        --set secret.edgeKek="$FORGE_EDGE_KEK"
        --set secret.edgeInternalToken="$FORGE_EDGE_INTERNAL_TOKEN"
        # --set database.type=postgres --set database.externalPostgres.host=... (point at your DB)
  environment:
    name: production

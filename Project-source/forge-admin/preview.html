<!doctype html>
<!--
  Forge 管理端 —— 静态视觉预览（非真实应用）。
  真实应用是 src/ 下的 React/Vite 工程，需要 node + npm install 才能跑。
  本文件零依赖，仅用于在没有 node/网络时直接在浏览器查看 UI 视觉与双语切换。
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forge · 预览</title>
<style>
  :root { --brand:#0f62fe; --brand-dark:#0043ce; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,sans-serif;
         background:#f1f5f9; color:#0f172a; -webkit-font-smoothing:antialiased; }
  .topbar { display:flex; justify-content:space-between; align-items:center; gap:1rem;
            background:#fff; border-bottom:1px solid #e2e8f0; padding:.7rem 1.5rem; }
  .brand { font-weight:600; }
  .muted { color:#64748b; font-size:.875rem; }
  select { border:1px solid #cbd5e1; border-radius:.375rem; background:#fff; padding:.25rem .5rem; font-size:.875rem; }
  .center { min-height:calc(100vh - 56px); display:flex; align-items:center; justify-content:center; padding:1rem; }
  .card { width:100%; max-width:24rem; background:#fff; border-radius:.75rem; padding:2rem;
          box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .card h1 { font-size:1.25rem; margin:0; }
  .row { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
  label.field { display:block; margin-bottom:1rem; }
  label.field > span { display:block; font-size:.875rem; font-weight:500; color:#334155; margin-bottom:.25rem; }
  input { width:100%; border:1px solid #cbd5e1; border-radius:.375rem; padding:.5rem .75rem; font-size:.875rem; outline:none; }
  input:focus { border-color:var(--brand); box-shadow:0 0 0 1px var(--brand); }
  .btn { width:100%; background:var(--brand); color:#fff; border:none; border-radius:.375rem;
         padding:.55rem; font-size:.875rem; font-weight:500; cursor:pointer; }
  .btn:hover { background:var(--brand-dark); }
  .link { color:var(--brand); font-size:.875rem; text-decoration:none; }
  .link:hover { text-decoration:underline; }
  .right { text-align:right; margin-top:.75rem; }
  .tabs { display:flex; gap:.5rem; margin:1rem 0; }
  .tab { flex:1; text-align:center; padding:.4rem; border:1px solid #cbd5e1; border-radius:.375rem; cursor:pointer; font-size:.85rem; }
  .tab.active { background:var(--brand); color:#fff; border-color:var(--brand); }
  .hint { font-size:.8rem; color:#64748b; }
  .mono { font-family:ui-monospace,Menlo,monospace; background:#f1f5f9; border-radius:.375rem; padding:.5rem; font-size:.8rem; word-break:break-all; }
  .switch { margin:1.5rem auto 0; max-width:24rem; text-align:center; }
  .pill { display:inline-block; padding:.2rem .6rem; border-radius:999px; background:#dcfce7; color:#166534; font-size:.75rem; }
  .banner { background:#fffbeb; border:1px solid #fde68a; color:#92400e; font-size:.8rem; padding:.5rem .75rem; border-radius:.375rem; margin:0 0 1rem; }
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand" data-i="brandbar"></span>
    <div style="display:flex;align-items:center;gap:1rem">
      <select id="lang" onchange="setLang(this.value)">
        <option value="zh-CN">中文</option>
        <option value="en">English</option>
      </select>
      <span class="muted">Admin (super_admin)</span>
    </div>
  </div>

  <div class="center">
    <div class="card">
      <p class="banner" data-i="previewNote"></p>
      <div class="row">
        <h1 data-i="loginTitle"></h1>
        <span class="pill">UI Preview</span>
      </div>

      <div class="tabs">
        <div class="tab active" id="tab-login" onclick="showView('login')" data-i="tabLogin"></div>
        <div class="tab" id="tab-2fa" onclick="showView('twofa')" data-i="tab2fa"></div>
        <div class="tab" id="tab-dash" onclick="showView('dash')" data-i="tabDash"></div>
      </div>

      <!-- login -->
      <div id="view-login">
        <label class="field"><span data-i="email"></span><input type="email" value="forge@navtra.ai" /></label>
        <label class="field"><span data-i="password"></span><input type="password" value="••••••••••••" /></label>
        <button class="btn" data-i="signin"></button>
        <div class="right"><a class="link" href="#" data-i="forgot"></a></div>
      </div>

      <!-- 2fa -->
      <div id="view-twofa" style="display:none">
        <p class="hint" data-i="twofaHint"></p>
        <div class="mono">JBSW Y3DP EHPK 3PXP</div>
        <label class="field" style="margin-top:1rem"><span data-i="code"></span><input inputmode="numeric" placeholder="000000" /></label>
        <button class="btn" data-i="enable2fa"></button>
      </div>

      <!-- dashboard -->
      <div id="view-dash" style="display:none">
        <p class="muted" data-i="dashSub"></p>
        <ul class="muted" style="line-height:1.9">
          <li data-i="navDashboard"></li><li data-i="navProducts"></li><li data-i="navCustomers"></li>
          <li data-i="navIssue"></li><li data-i="navLicenses"></li><li data-i="navAudit"></li><li data-i="navSettings"></li>
        </ul>
      </div>
    </div>
  </div>

<script>
  const I18N = {
    "zh-CN": { brandbar:"Forge · 仪表盘", previewNote:"静态视觉预览（非真实应用）。真实登录走 React 工程 + 后端 Session。",
      loginTitle:"登录 Forge", tabLogin:"登录", tab2fa:"两步验证", tabDash:"仪表盘",
      email:"邮箱", password:"密码", signin:"登录", forgot:"忘记密码？",
      twofaHint:"用身份验证器扫描二维码或手动输入密钥，然后输入 6 位验证码。", code:"验证码", enable2fa:"启用两步验证",
      dashSub:"许可证签发中枢", navDashboard:"· 仪表盘", navProducts:"· 产品", navCustomers:"· 客户",
      navIssue:"· 签发", navLicenses:"· 许可证", navAudit:"· 审计日志", navSettings:"· 设置" },
    "en": { brandbar:"Forge · Dashboard", previewNote:"Static visual preview (not the real app). Real login runs the React app + backend session.",
      loginTitle:"Sign in to Forge", tabLogin:"Sign in", tab2fa:"Two-step", tabDash:"Dashboard",
      email:"Email", password:"Password", signin:"Sign in", forgot:"Forgot password?",
      twofaHint:"Scan the QR or enter the secret in your authenticator, then enter the 6-digit code.", code:"Code", enable2fa:"Enable two-step verification",
      dashSub:"License Authority", navDashboard:"· Dashboard", navProducts:"· Products", navCustomers:"· Customers",
      navIssue:"· Issue", navLicenses:"· Licenses", navAudit:"· Audit logs", navSettings:"· Settings" }
  };
  function setLang(l){ document.documentElement.lang=l;
    document.querySelectorAll("[data-i]").forEach(e=>{ const k=e.getAttribute("data-i"); if(I18N[l][k]!=null) e.textContent=I18N[l][k]; }); }
  function showView(v){ for(const x of ["login","twofa","dash"]){ document.getElementById("view-"+x).style.display = v===x?"block":"none";
      document.getElementById("tab-"+(x==="twofa"?"2fa":x)).classList.toggle("active", v===x); } }
  setLang("zh-CN");
</script>
</body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forge</title>
    <!-- Apply theme before paint to avoid a flash (light/dark/system). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("forge-theme") || "system";
          var dark = t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <!-- Runtime config injection (private delivery: no hardcoded endpoints). -->
    <script>
      window.__APP_CONFIG__ = { apiBase: "/admin-api/v1" };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

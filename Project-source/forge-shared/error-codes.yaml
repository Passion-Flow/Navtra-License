ISSUE_DEPLOYMENT_ID_REQUIRED: { http: 400, log_level: info, message: { zh-CN: "离线签发需要部署ID.", en: "Offline issuance requires a deployment ID." } }
ISSUE_DEPLOYMENT_ID_INVALID:  { http: 400, log_level: info, message: { zh-CN: "部署ID格式非法：应为产品生成的 64 位十六进制硬件指纹.", en: "Invalid deployment ID: expected the product's 64-char hex hardware fingerprint." } }

EDGE_UPSTREAM_UNAVAILABLE:   { http: 503, log_level: error, message: { zh-CN: "校验服务暂不可用.", en: "Validation service temporarily unavailable." } }
KEY_ROTATION_CONFLICT:       { http: 409, log_level: warning, message: { zh-CN: "密钥轮换冲突.", en: "Key rotation conflict." } }

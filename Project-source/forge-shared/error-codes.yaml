# Forge error-code dictionary — single source of truth (HARD RULE: error-codes.md).
# Backend loads this into memory; frontend build syncs it to locales/<lang>/errors.json.
# Each code: http status, bilingual message (zh-CN + en), log_level.
# Business code NEVER raises bare strings; only `raise BizError("<CODE>")`.

# ---- Auth ----------------------------------------------------------------
AUTH_REQUIRED:               { http: 401, log_level: info,  message: { zh-CN: "需要登录.", en: "Authentication required." } }
AUTH_INVALID_CREDENTIALS:    { http: 401, log_level: warning, message: { zh-CN: "邮箱或密码错误.", en: "Invalid email or password." } }
AUTH_ACCOUNT_LOCKED:         { http: 423, log_level: warning, message: { zh-CN: "账号已锁定，请稍后重试.", en: "Account locked, try again later." } }
AUTH_ACCOUNT_DISABLED:       { http: 403, log_level: warning, message: { zh-CN: "账号已停用.", en: "Account disabled." } }
AUTH_PASSWORD_WEAK:          { http: 400, log_level: info,  message: { zh-CN: "密码强度不足.", en: "Password does not meet policy." } }
AUTH_PASSWORD_RESET_TOKEN_INVALID: { http: 400, log_level: warning, message: { zh-CN: "重置链接无效或已过期.", en: "Reset link invalid or expired." } }
AUTH_2FA_REQUIRED:           { http: 403, log_level: info,  message: { zh-CN: "需要两步验证.", en: "Two-step verification required." } }
AUTH_2FA_INVALID:            { http: 400, log_level: warning, message: { zh-CN: "验证码错误.", en: "Invalid verification code." } }

# ---- Permission ----------------------------------------------------------
PERM_DENIED:                 { http: 403, log_level: warning, message: { zh-CN: "无权执行此操作.", en: "Permission denied." } }
PERM_ROLE_REQUIRED:          { http: 403, log_level: warning, message: { zh-CN: "需要更高权限角色.", en: "A higher-privilege role is required." } }

# ---- Validation / Resource ----------------------------------------------
VALIDATION_FAILED:           { http: 400, log_level: info,  message: { zh-CN: "请求参数校验失败.", en: "Validation failed." } }
RESOURCE_NOT_FOUND:          { http: 404, log_level: info,  message: { zh-CN: "资源不存在.", en: "Resource not found." } }
RESOURCE_CONFLICT:           { http: 409, log_level: info,  message: { zh-CN: "资源已存在或冲突.", en: "Resource conflict." } }
USER_SELF_LOCKOUT:           { http: 409, log_level: warning, message: { zh-CN: "不能停用、降级或删除自己.", en: "You cannot disable, demote, or delete your own account." } }
USER_LAST_SUPER_ADMIN:       { http: 409, log_level: warning, message: { zh-CN: "不能移除最后一个超级管理员.", en: "Cannot remove the last super admin." } }
RESOURCE_GONE:               { http: 410, log_level: info,  message: { zh-CN: "资源已删除.", en: "Resource gone." } }

# ---- Rate limit ----------------------------------------------------------
RATE_LIMIT_EXCEEDED:         { http: 429, log_level: warning, message: { zh-CN: "请求过于频繁，请稍后再试.", en: "Too many requests." } }
RATE_LIMIT_LOGIN_BLOCKED:    { http: 429, log_level: warning, message: { zh-CN: "登录尝试过于频繁.", en: "Too many login attempts." } }

# ---- System / External ---------------------------------------------------
SYSTEM_INTERNAL_ERROR:       { http: 500, log_level: error, message: { zh-CN: "系统内部错误.", en: "Internal server error." } }
EXTERNAL_SERVICE_UNAVAILABLE: { http: 503, log_level: error, message: { zh-CN: "依赖服务不可用.", en: "Dependency unavailable." } }
EXTERNAL_SERVICE_TIMEOUT:    { http: 504, log_level: error, message: { zh-CN: "依赖服务超时.", en: "Dependency timeout." } }

